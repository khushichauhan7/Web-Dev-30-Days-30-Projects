<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Clock</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="stars" id="stars"></div>

  <h1 class="page-title">Digital Clock</h1>

  <div class="clock-wrapper">
    <div class="clock-card">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>

      <div class="date-display" id="date">2026-05-12 TUE</div>
      <div class="time-display" id="time">00<span class="colon">:</span>00<span class="colon">:</span>00</div>
      <div class="label">Digital Clock</div>
    </div>
  </div>
  <script src="script.js"></script>
</body>

</html>
